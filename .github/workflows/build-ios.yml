name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web shell
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Copy native plugins
        run: |
          mkdir -p ios/App/App/Plugins
          cp -R native/Plugins/GameServerPlugin ios/App/App/Plugins/GameServerPlugin/
          cp -R native/Plugins/SaveDataPlugin ios/App/App/Plugins/SaveDataPlugin/
          cp native/AppDelegate.swift ios/App/App/AppDelegate.swift
          cp native/Podfile ios/App/Podfile

      - name: Register native plugins in Xcode
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          p = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          t = p.targets.find { |x| x.name == 'App' }
          g = p.main_group.find_subpath('App', true).find_subpath('Plugins', true)
          g.path = 'Plugins'
          Dir.glob('ios/App/App/Plugins/**/*.swift').each do |f|
            ref = g.new_file(f.sub('ios/App/App/Plugins/', ''))
            t.source_build_phase.add_file_reference(ref) unless t.source_build_phase.files.any? { |bf| bf.file_ref&.path&.end_with?(File.basename(f)) }
          end
          Dir.glob('ios/App/App/Plugins/**/*.m').each do |f|
            ref = g.new_file(f.sub('ios/App/App/Plugins/', ''))
            t.source_build_phase.add_file_reference(ref) unless t.source_build_phase.files.any? { |bf| bf.file_ref&.path&.end_with?(File.basename(f)) }
          end
          p.save
          "

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update
          cd ../..

      - name: Set deployment target to iOS 16
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9]*\.[0-9][0-9]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' ios/App/App.xcodeproj/project.pbxproj ios/App/Pods/Pods.xcodeproj/project.pbxproj 2>/dev/null || true

      - name: Build IPA (unsigned)
        run: |
          cd ios/App
          xcodebuild clean archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath ../../dist/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee ../../dist/build.log
          # If build fails, show last 100 lines of log for debugging
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "=== LAST 100 LINES OF BUILD LOG ==="
            tail -100 ../../dist/build.log
            exit 1
          fi

          # Create unsigned IPA from archive
          mkdir -p ../../dist/Payload
          cp -R ../../dist/App.xcarchive/Products/Applications/App.app ../../dist/Payload/
          cd ../../dist
          zip -r RPGMakerPlayer-unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGMakerPlayer-iOS
          path: dist/RPGMakerPlayer-unsigned.ipa

      - name: Build summary
        run: |
          echo "### IPA Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact from this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** This IPA is unsigned. To install on a real device, you need:" >> $GITHUB_STEP_SUMMARY
          echo "1. An Apple Developer account (\$99/year)" >> $GITHUB_STEP_SUMMARY
          echo "2. Sign the IPA with your certificate" >> $GITHUB_STEP_SUMMARY
          echo "3. Or use AltStore/Sideloadly to sideload" >> $GITHUB_STEP_SUMMARY
